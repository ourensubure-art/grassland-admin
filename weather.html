<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>草原AI协作平台 - 牧民端首页</title>
  <style>
    /* 全局变量：把平台的主色、强调色、背景色集中管理，后续改主题更方便 */
    :root {
      --bg: #FAF6EC;
      --green: #4A7C3A;
      --orange: #E89253;
      --text: #253321;
      --muted: #6A735F;
      --card: #FFFFFF;
      --line: #DDE6D4;
      --shadow: 0 10px 28px rgba(74, 124, 58, 0.14);
    }

    /* 统一盒模型，避免 padding 撑破移动端宽度 */
    * {
      box-sizing: border-box;
    }

    /* 页面移动端优先：米白背景、基础字号 16px、内容最大 480px 居中 */
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 16px;
    }

    /* 首页容器：手机上左右留 16px，宽屏时保持 480px 的手机布局 */
    .app {
      width: min(100%, 480px);
      margin: 0 auto;
      padding: 22px 16px 32px;
    }

    /* 每个业务模块都使用大圆角卡片，形成清晰的触控区域 */
    .card {
      margin-top: 16px;
      padding: 18px;
      border-radius: 16px;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    /* 欢迎栏不使用白色卡片，让首页开头更轻、更像移动端工作台 */
    .welcome {
      padding: 8px 2px 6px;
    }

    .welcome h1 {
      margin: 0;
      color: var(--green);
      font-size: 30px;
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: 0;
    }

    .welcome p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.5;
    }

    /* 卡片标题统一样式，保证草场、天气等模块一眼能扫到 */
    .section-title {
      margin: 0 0 14px;
      font-size: 21px;
      line-height: 1.3;
      font-weight: 800;
      letter-spacing: 0;
    }

    /* 天气查询表单：输入框和按钮并排，适合单手快速查询 */
    .weather-form {
      display: grid;
      grid-template-columns: 1fr 92px;
      gap: 10px;
      margin-bottom: 16px;
    }

    .weather-form input {
      width: 100%;
      min-width: 0;
      height: 50px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--text);
      background: #FBFDF8;
      font: inherit;
      outline: none;
    }

    .weather-form input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 4px rgba(74, 124, 58, 0.12);
    }

    /* 页面所有按钮基础字号 18px，便于户外手机操作 */
    button {
      min-height: 50px;
      border-radius: 12px;
      border: 0;
      font: inherit;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    button:disabled {
      cursor: progress;
      opacity: 0.72;
    }

    .search-btn {
      color: #FFFFFF;
      background: var(--green);
    }

    /* 天气主信息：温度大号展示，状态和放牧建议放在右侧 */
    .weather-main {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
      align-items: center;
      padding: 16px;
      border-radius: 16px;
      background: #F6FAF0;
    }

    .temperature {
      color: var(--green);
      font-size: 56px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0;
    }

    .weather-info p {
      margin: 0;
      line-height: 1.45;
    }

    .location {
      color: var(--muted);
      font-size: 15px;
    }

    .weather-name {
      margin-top: 4px;
      font-size: 22px;
      font-weight: 800;
    }

    .weather-place {
      margin-top: 6px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
    }

    .weather-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .weather-detail {
      padding: 12px;
      border-radius: 12px;
      background: #FBFDF8;
      border: 1px solid var(--line);
    }

    .weather-detail span {
      display: block;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .weather-detail strong {
      display: block;
      margin-top: 5px;
      color: var(--text);
      font-size: 18px;
      line-height: 1.35;
      font-weight: 900;
    }

    /* 放牧判断标签：绿色代表适合，橙色代表需要注意 */
    .grazing-tag {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      margin-top: 10px;
      padding: 0 12px;
      border-radius: 999px;
      color: #FFFFFF;
      background: var(--green);
      font-weight: 800;
    }

    .grazing-tag.warning {
      background: var(--orange);
    }

    .weather-status {
      min-height: 24px;
      margin-top: 12px;
      color: #A95826;
      font-weight: 700;
      line-height: 1.5;
    }

    /* 草场信息行：左侧标签、右侧数值，保持阅读顺序稳定 */
    .pasture-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
      font-size: 18px;
      line-height: 1.5;
    }

    .pasture-label {
      color: var(--muted);
    }

    .pasture-value {
      font-weight: 800;
    }

    /* 返青进度条：外层是浅色轨道，内层通过 JS/CSS 百分比控制宽度 */
    .progress-wrap {
      margin-top: 14px;
    }

    .progress-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 16px;
      font-weight: 700;
    }

    .progress-track {
      width: 100%;
      height: 16px;
      overflow: hidden;
      border-radius: 999px;
      background: #E8EEDC;
    }

    .progress-bar {
      width: 65%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), #77A95D);
    }

    /* 功能按钮区：三个大按钮纵向排列，保证拇指可点区域充足 */
    .actions {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .action-btn {
      width: 100%;
      min-height: 64px;
      padding: 0 18px;
      text-align: left;
    }

    .action-btn.primary {
      color: #FFFFFF;
      background: var(--green);
    }

    .action-btn.secondary {
      color: var(--green);
      border: 2px solid var(--green);
      background: #FFFFFF;
    }

    .action-btn:active {
      transform: translateY(1px);
    }

    /* 窄屏兜底：如果设备很小，天气表单自动上下排列，避免文字拥挤 */
    @media (max-width: 360px) {
      .weather-form,
      .weather-main {
        grid-template-columns: 1fr;
      }

      .temperature {
        font-size: 50px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <!-- 1. 欢迎栏：问候语和日期都由 JS 根据当前时间动态生成 -->
    <header class="welcome">
      <h1 id="greeting">早上好，巴特尔</h1>
      <p id="todayText">正在生成日期...</p>
    </header>

    <!-- 2. 天气卡片：保留城市查询能力，并加入是否适合放牧的业务判断 -->
    <section class="card" aria-labelledby="weatherTitle">
      <h2 id="weatherTitle" class="section-title">今日天气</h2>

      <form id="weatherForm" class="weather-form">
        <input id="cityInput" type="search" value="锡林浩特" placeholder="输入城市" autocomplete="off" required>
        <button id="searchButton" class="search-btn" type="submit">查询</button>
      </form>

      <div id="weatherResult" class="weather-main">
        <div id="temperature" class="temperature">--°</div>
        <div class="weather-info">
          <p id="location" class="location">正在获取位置...</p>
          <p id="weatherName" class="weather-name">天气加载中</p>
          <p id="weatherPlace" class="weather-place">请确认查询地点</p>
          <span id="grazingTag" class="grazing-tag">判断中</span>
        </div>
      </div>

      <div class="weather-details">
        <div class="weather-detail">
          <span>风向风力</span>
          <strong id="windText">--</strong>
        </div>
        <div class="weather-detail">
          <span>湿度</span>
          <strong id="humidityText">--</strong>
        </div>
        <div class="weather-detail">
          <span>体感温度</span>
          <strong id="feelsLikeText">--</strong>
        </div>
        <div class="weather-detail">
          <span>坐标</span>
          <strong id="coordText">--</strong>
        </div>
      </div>

      <div id="weatherStatus" class="weather-status" role="status" aria-live="polite"></div>
    </section>

    <!-- 3. 草场状态卡片：展示牧民最关心的草场名称、返青进度和载畜量 -->
    <section class="card" aria-labelledby="pastureTitle">
      <h2 id="pastureTitle" class="section-title">🌱 我的草场</h2>

      <div class="pasture-row">
        <span class="pasture-label">草场名称</span>
        <span class="pasture-value">东草场</span>
      </div>

      <div class="progress-wrap">
        <div class="progress-head">
          <span>返青进度</span>
          <span>65%</span>
        </div>
        <div class="progress-track" aria-label="返青进度 65%">
          <div class="progress-bar"></div>
        </div>
      </div>

      <div class="pasture-row">
        <span class="pasture-label">载畜量</span>
        <span class="pasture-value">120只羊</span>
      </div>
    </section>

    <!-- 4. 功能按钮区：后续可接入拍照上报、AI问答、通知中心 -->
    <section class="actions" aria-label="功能入口">
      <button class="action-btn primary" type="button" onclick="goUpload()">📸 上报草场观察</button>
      <button class="action-btn secondary" type="button" onclick="showDeveloping()">💬 问AI建议</button>
      <button class="action-btn secondary" type="button" onclick="showDeveloping()">🔔 我的通知</button>
    </section>
  </main>

  <script>
    /*
      天气代码映射表：
      Open-Meteo 返回的是数字 weather_code，这里把数字转换成牧民能直接读懂的中文天气。
    */
    const weatherText = {
      0: "晴朗",
      1: "大部晴朗",
      2: "局部多云",
      3: "阴天",
      45: "有雾",
      48: "雾凇",
      51: "小毛毛雨",
      53: "中等毛毛雨",
      55: "大毛毛雨",
      56: "冻毛毛雨",
      57: "强冻毛毛雨",
      61: "小雨",
      63: "中雨",
      65: "大雨",
      66: "冻雨",
      67: "强冻雨",
      71: "小雪",
      73: "中雪",
      75: "大雪",
      77: "雪粒",
      80: "短时小阵雨",
      81: "短时中阵雨",
      82: "强阵雨",
      85: "小阵雪",
      86: "强阵雪",
      95: "雷暴",
      96: "雷暴伴小冰雹",
      99: "雷暴伴强冰雹"
    };

    /* 获取页面上的常用元素，后续更新内容时直接复用 */
    const greeting = document.querySelector("#greeting");
    const todayText = document.querySelector("#todayText");
    const weatherForm = document.querySelector("#weatherForm");
    const cityInput = document.querySelector("#cityInput");
    const searchButton = document.querySelector("#searchButton");
    const temperature = document.querySelector("#temperature");
    const locationText = document.querySelector("#location");
    const weatherName = document.querySelector("#weatherName");
    const grazingTag = document.querySelector("#grazingTag");
    const weatherStatus = document.querySelector("#weatherStatus");

    /*
      初始化欢迎栏：
      0-10 点显示早上好，11-13 点显示中午好，其余时间显示晚上好。
      日期使用浏览器本地时间生成，适配手机上的系统时区。
    */
    function updateWelcome() {
      const now = new Date();
      const hour = now.getHours();
      let greetingWord = "晚上好";

      if (hour >= 5 && hour < 11) {
        greetingWord = "早上好";
      } else if (hour >= 11 && hour < 14) {
        greetingWord = "中午好";
      }

      greeting.textContent = `${greetingWord}，巴特尔`;
      todayText.textContent = now.toLocaleDateString("zh-CN", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "long"
      });
    }

    /*
      天气表单提交：
      先根据城市名查询经纬度，再用经纬度查询实时天气。
    */
    weatherForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const city = cityInput.value.trim();
      if (!city) {
        setWeatherStatus("请输入城市名。");
        return;
      }

      setLoading(true);
      setWeatherStatus("正在查询天气...");

      try {
        const place = await findPlace(city);
        const weather = await getWeather(place.latitude, place.longitude);
        renderWeather(place, weather);
        setWeatherStatus("");
      } catch (error) {
        setWeatherStatus(error.message || "天气查询失败，请稍后再试。");
      } finally {
        setLoading(false);
      }
    });

    /*
      查询城市经纬度：
      使用 Open-Meteo 的地理编码接口，不需要 API Key。
    */
    async function findPlace(city) {
      const url = new URL("https://geocoding-api.open-meteo.com/v1/search");
      url.search = new URLSearchParams({
        name: city,
        count: "1",
        language: "zh",
        format: "json"
      });

      const response = await fetch(url);
      if (!response.ok) {
        throw new Error("城市查询服务暂时不可用。");
      }

      const data = await response.json();
      if (!data.results || data.results.length === 0) {
        throw new Error("没有找到这个城市，请换个名称试试。");
      }

      return data.results[0];
    }

    /*
      查询实时天气：
      这里只取首页需要的温度和天气代码，让页面更轻。
    */
    async function getWeather(latitude, longitude) {
      const url = new URL("https://api.open-meteo.com/v1/forecast");
      url.search = new URLSearchParams({
        latitude,
        longitude,
        current: "temperature_2m,weather_code",
        timezone: "auto"
      });

      const response = await fetch(url);
      if (!response.ok) {
        throw new Error("天气服务暂时不可用。");
      }

      return response.json();
    }

    /*
      渲染天气卡片：
      温度低于 5 度或高于 30 度时显示“不宜放牧”，其他温度显示“适合放牧”。
    */
    function renderWeather(place, weather) {
      const current = weather.current;
      const temp = Math.round(current.temperature_2m);
      const province = place.admin1 ? `，${place.admin1}` : "";
      const country = place.country ? `，${place.country}` : "";
      const isGoodForGrazing = temp >= 5 && temp <= 30;

      temperature.textContent = `${temp}°`;
      locationText.textContent = `${place.name}${province}${country}`;
      weatherName.textContent = weatherText[current.weather_code] || "天气情况未知";
      grazingTag.textContent = isGoodForGrazing ? "适合放牧" : "不宜放牧";
      grazingTag.classList.toggle("warning", !isGoodForGrazing);
    }

    /* 控制查询按钮的加载态，避免重复点击造成多次请求 */
    function setLoading(isLoading) {
      searchButton.disabled = isLoading;
      searchButton.textContent = isLoading ? "查询中" : "查询";
    }

    /* 在天气卡片底部显示查询提示或错误信息 */
    function setWeatherStatus(message) {
      weatherStatus.textContent = message;
    }

    /* 功能按钮占位逻辑：等后续功能完成后，可以替换成页面跳转或弹窗 */
    function showDeveloping() {
      alert("功能开发中");
    }

    /* 跳转到拍照上报页面 */
    function goUpload() {
      window.location.href = "upload.html";
    }

    /* 页面进入时立即更新欢迎栏，并默认查询锡林浩特天气，更贴近草原场景 */
    updateWelcome();
    weatherForm.dispatchEvent(new Event("submit"));
  </script>
</body>
</html>
